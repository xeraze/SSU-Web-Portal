<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Головна — Служба безпеки України</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-color: #0d0d0d;
            --text-color: #ffffff;
            --accent-color: #005bbb;
            --accent-hover: #ffd500;
            --gray-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(13, 13, 13, 0.95);
            border-bottom: 1px solid var(--gray-color);
            z-index: 1000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--accent-color);
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-menu li a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-menu li a:hover {
            color: var(--accent-color);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #fff;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            color: #000;
        }

        .hamburger {
            display: none;
            cursor: pointer;
            flex-direction: column;
            gap: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: var(--text-color);
            transition: 0.3s;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://via.placeholder.com/1920x1080/1a1a1a/333333?text=SBU+Background') no-repeat center center/cover;
            margin-top: 80px;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 40px auto;
            color: #cccccc;
        }

        @media (max-width: 768px) {
            .nav-menu {
                position: fixed;
                top: 80px;
                left: -100%;
                flex-direction: column;
                background-color: var(--bg-color);
                width: 100%;
                text-align: center;
                transition: 0.3s;
                padding: 40px 0;
                border-bottom: 1px solid var(--gray-color);
            }

            .nav-menu.active {
                left: 0;
            }

            .nav-menu li {
                margin: 15px 0;
            }

            .hamburger {
                display: flex;
            }
            
            .hero h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <a href="#" class="logo"><span>СБУ</span> Портал</a>
            
            <ul class="nav-menu">
                <li><a href="#">Головна</a></li>
                <li><a href="#">Про структуру</a></li>
                <li><a href="#">Вакансії</a></li>
                <li><a href="#">Контакти</a></li>
            </ul>

            <button class="btn-primary">Подати заявку</button>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div>
                <h1>Захищай країну<br>з найкращими</h1>
                <p>Офіційний портал рекрутингу Служби безпеки України. Приєднуйся до команди професіоналів. Набір до бойових та оперативних підрозділів триває.</p>
                <button class="btn-primary" style="padding: 15px 40px; font-size: 18px;">Обрати вакансію</button>
            </div>
        </section>
    </main>

    <script>

        const hamburger = document.querySelector(".hamburger");
        const navMenu = document.querySelector(".nav-menu");

        hamburger.addEventListener("click", () => {
            hamburger.classList.toggle("active");
            navMenu.classList.toggle("active");
        });

        document.querySelectorAll(".nav-menu li a").forEach(n => n.addEventListener("click", () => {
            hamburger.classList.remove("active");
            navMenu.classList.remove("active");
        }));
    </script>
</body>
</html>
