<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СБУ | Веб-Портал</title>

    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
        }

        .video-placeholder {
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #333;
            aspect-ratio: 16 / 9;
            width: 100%;
        }

        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: rgba(0,0,0,0.8);
        }

        a {
            color: #fff;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            color: #f3d400;
        }

    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <svg width="50" height="50" viewBox="0 0 100 100">
                    <rect width="100" height="100" fill="#f3d400"/>
                    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="black" font-weight="bold">AB3</text>
                </svg>
            </div>
            <ul style="display:flex; list-style:none; gap:20px;">
                <li><a href="#">Головна</a></li>
                <li><a href="#">Про СБУ</a></li>
                <li><a href="#">Вакансії</a></li>
                <li><a href="#">Допомога</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-video">
            <div class="video-placeholder">
                <span>[Відео видалено для оптимізації]</span>
            </div>
        </section>

        <article style="padding: 50px;">
            <h1>Приєднуйся до найкращих</h1>
            <p>Очищений текстовий блок для вашого проекту.</p>
            <button style="padding: 15px 30px; background: #f3d400; border: none; font-weight: bold; cursor: pointer;">
                ПОДАТИ ЗАЯВКУ
            </button>
        </article>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Сторінка завантажена та очищена від сміття.');

            const links = document.querySelectorAll('a[href="#"]');
            links.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    alert('Це посилання-заглушка (очищено від переходів).');
                });
            });
        });

    </script>
</body>
</html>
</html>
